<!DOCTYPE html>
<html>
<head>
  <title>Project Spider User Portal</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
    }

    .container {
      display: flex;
      gap: 50px;
    }

    .left {
      width: 300px;
      background-color: #f5f5dc; /* Beige */
      padding: 20px;
      border-radius: 8px;
    }

    .right {
      flex: 1;
      background-color: #0b1f3a; /* Dark Blue */
      color: white;
      padding: 20px;
      border-radius: 8px;
    }

    input { 
      margin: 5px 0; 
      padding: 5px; 
      width: 200px; 
    }

    button { 
      margin: 5px 5px 5px 0; 
      padding: 5px 10px; 
      cursor: pointer;
    }

    #files { 
      margin-top: 10px; 
      list-style: none;
      padding-left: 0;
    }

    .right li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
<pre>
PROJECT
  / _ \
\_\(_)/_/
 _//o\\_ 
  /   \
SPIDER
</pre>
    
  <h2>Sign Up / Log In</h2>
  <input id="username" placeholder="Username" />
  <br/>
  <input id="password" placeholder="Password" type="password" />
  <br/>
  <input id="uid" placeholder="UID (Required for Login)" />
  <button onclick="copyUID()">Copy UID</button>
  <br/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h3>Upload a file:</h3>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload</button>
    <button onclick="uploadMultipart()">Upload Large File (5MB+) (Non-Functional For Now)</button>

    <h3>Files in your bucket:</h3>
    <ul id="files"></ul>
  </div>

</div>

<script>
  const API_URL = "https://eu4gu0tc83.execute-api.us-east-2.amazonaws.com/spoder/user";
  let currentBucket = "";

  // -----------------------------
  // SIGNUP
  // -----------------------------
  async function signup() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) { alert("Enter both username and password."); return; }

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "signup", username, password })
      });
      const data = await res.json();
      alert(JSON.stringify(data));

      if (data.bucket) currentBucket = data.bucket;
      if (data.uid) document.getElementById("uid").value = data.uid;

    } catch (err) {
      alert("Signup error: " + err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // LOGIN
  // -----------------------------
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const uid = document.getElementById("uid").value.trim();

    if (!username || !password || !uid) { alert("Enter username, password, and UID."); return; }

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "login", username, password, uid })
      });
      const data = await res.json();

      if (!data.files) { alert(data.error || "Login failed"); return; }

      currentBucket = data.bucket;
      renderFileList(data.files);

    } catch (err) {
      alert("Login error: " + err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // RENDER FILE LIST
  // -----------------------------
  function renderFileList(files){
    const ul = document.getElementById("files");
    ul.innerHTML = "";

    files.forEach(f => {
      const li = document.createElement("li");
      li.innerHTML = `
        ${f}
        <button onclick="viewFile('${f}')">View</button>
        <button onclick="downloadFile('${f}')">Download</button>
        <button onclick="deleteFile('${f}')">Delete</button>
      `;
      ul.appendChild(li);
    });
  }

  // -----------------------------
  // VIEW FILE
  // -----------------------------
  async function viewFile(filename){
    try {
      const res = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ action:"get_file_url", bucket:currentBucket, filename })
      });
      const data = await res.json();
    
      if (!data.url) { alert("Failed to get file URL"); return; }

      // Open in new tab
      window.open(data.url, "_blank");
    } catch(err){
      alert("View file error: " + err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // DOWNLOAD FILE
  // -----------------------------
  async function downloadFile(filename){
    try {
      const res = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ action:"get_file_url", bucket:currentBucket, filename })
      });
      const data = await res.json();

      if (!data.url) { alert("Failed to get file URL"); return; }

        // Fetch file as blob
      const fileRes = await fetch(data.url);
      const blob = await fileRes.blob();

      // Create temporary download link
      const a = document.createElement("a");
      const url = window.URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);

    } catch(err){
      alert("Download error: " + err.message);
      console.error(err);
    }
  }
  
  // -----------------------------
  // DELETE FILE
  // -----------------------------
  async function deleteFile(filename){
    if(!confirm(`Are you sure you want to delete "${filename}"?`)) return;
    try {
      await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ action:"delete", bucket:currentBucket, filename })
      });
      login(); // refresh file list
    } catch(err){
      alert("Delete error: " + err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // UPLOAD FILE
  // -----------------------------
  async function uploadFile(){
    const fileInput = document.getElementById("fileInput");
    if(!fileInput.files.length){ alert("Select a file first."); return; }
    if(!currentBucket){ alert("Log in first."); return; }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(){
      const fileContent = reader.result.split(",")[1];
      try {
        await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            action:"upload",
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            uid: document.getElementById("uid").value,
            bucket: currentBucket,
            filename: file.name,
            content: fileContent
          })
        });
        fileInput.value = ""; // clear file input
        login(); // refresh file list
      } catch(err){
        alert("Upload error: " + err.message);
        console.error(err);
      }
    };
    reader.readAsDataURL(file);
  }

  // -----------------------------
  // MULTIPART UPLOAD
  // -----------------------------
  async function uploadMultipart(){
    const fileInput = document.getElementById("fileInput");
    if(!fileInput.files.length){ alert("Select a file first."); return; }
    if(!currentBucket){ alert("Log in first."); return; }

    const file = fileInput.files[0];

    try {
      const startRes = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          action:"start_multipart",
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
          uid: document.getElementById("uid").value,
          filename: file.name
        })
      });
      const { uploadId } = await startRes.json();
      if(!uploadId) throw new Error("Failed to get uploadId");

      const chunkSize = 5*1024*1024; // 5MB
      const parts = [];
      let partNumber = 1;

      for(let start=0; start<file.size; start+=chunkSize){
        const chunk = file.slice(start, start+chunkSize);
        const presignRes = await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            action:"get_presigned_part",
            uploadId,
            filename: file.name,
            partNumber,
            bucket: currentBucket
          })
        });
        const { url } = await presignRes.json();
        if(!url) throw new Error("Failed to get presigned URL for part " + partNumber);
        const uploadRes = await fetch(url,{ method:"PUT", body:chunk });
        const eTag = uploadRes.headers.get("ETag")?.replace(/"/g,"");
        if(!eTag) throw new Error("Missing ETag for part " + partNumber);
        parts.push({ ETag: eTag, PartNumber: partNumber });
        partNumber++;
      }

      const completeRes = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          action:"complete_multipart",
          bucket: currentBucket,
          filename: file.name,
          uploadId,
          parts
        })
      });
      const completeData = await completeRes.json();
      if(!completeData.success) throw new Error("Multipart completion failed");

      alert("Large file upload complete!");
      fileInput.value = "";
      login();

    } catch(err){
      alert("Multipart upload error: "+err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // COPY UID
  // -----------------------------
  function copyUID(){
    const uidField = document.getElementById("uid");
    if(!uidField.value){ alert("No UID to copy."); return; }

    if (navigator.clipboard) {
      navigator.clipboard.writeText(uidField.value)
        .then(()=>alert("UID copied to clipboard!"))
        .catch(err=>alert("Clipboard error: "+err));
    } else {
      uidField.select();
      document.execCommand("copy");
      alert("UID copied to clipboard!");
    }
  }
</script>

</body>
</html>
