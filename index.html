<!DOCTYPE html>
<html>
<head>
  <title>Project Spider User Portal</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
    }

    .container {
      display: flex;
    }

    .left {
      width: 300px;
      margin-right: 50px;
      background-color: #f5f5dc; /* Beige */
      padding: 20px;
      border-radius: 8px;
    }

    .right {
      flex: 1;
      background-color: #0b1f3a; /* Dark Blue */
      color: white;
      padding: 20px;
      border-radius: 8px;
    }

    input { 
      margin: 5px 0; 
      padding: 5px; 
      width: 200px; 
    }

    button { 
      margin: 5px 5px 5px 0; 
      padding: 5px 10px; 
      cursor: pointer;
    }

    #files { 
      margin-top: 10px; 
    }

  /* Make file names readable on dark background */
    .right li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
<pre>
PROJECT
  / _ \
\_\(_)/_/
 _//o\\_ 
  /   \
SPIDER
</pre>
    
  <h2>Sign Up / Log In</h2>
  <input id="username" placeholder="Username" />
  <br/>
  <input id="password" placeholder="Password" type="password" />
  <br/>
  <input id="uid" placeholder="UID (Required for Login)" />
  <button onclick="copyUID()">Copy UID</button>
  <br/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h3>Upload a file:</h3>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload</button>
    <button onclick="uploadMultipart()">Upload Large File (5MB+)</button>

    <h3>Files in your bucket:</h3>
    <ul id="files"></ul>
  </div>

</div>

<script>
  const API_URL = "https://eu4gu0tc83.execute-api.us-east-2.amazonaws.com/spoder/user";
  let currentBucket = "";

  async function signup() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!username || !password) { 
      alert("Enter both username and password."); 
      return; 
    }

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "signup", username, password })
    });

    const data = await res.json();
    alert(JSON.stringify(data));

    if(data.bucket) currentBucket = data.bucket;

    /* NEW: Auto-fill UID after signup */
    if(data.uid){
      document.getElementById("uid").value = data.uid;
    }
  }

  async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const uid = document.getElementById("uid").value;

    if(!username || !password || !uid) { 
      alert("Enter username, password, and UID."); 
      return; 
    }

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", username, password, uid })
    });

    const data = await res.json();

    if(data.files) {
      currentBucket = data.bucket;
      const ul = document.getElementById("files");
      ul.innerHTML = "";

      data.files.forEach(f => {
        const li = document.createElement("li");

        li.innerHTML = `
          ${f}
          <button onclick="viewFile('${f}')">View</button>
          <button onclick="deleteFile('${f}')">Delete</button>
        `;

        ul.appendChild(li);
      });

    } else if(data.error) {
      alert("Error: " + data.error);
    } else {
      alert(JSON.stringify(data));
    }
  }

  async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    if(!fileInput.files.length) { alert("Select a file first."); return; }
    if(!currentBucket) { alert("Log in first."); return; }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function() {
      const fileContent = reader.result;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "upload",
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
          uid: document.getElementById("uid").value,
          bucket: currentBucket,
          filename: file.name,
          content: fileContent.split(",")[1]
        })
      });

      const data = await res.json();
      alert(JSON.stringify(data));
      if(data.success) login();
    };

    reader.readAsDataURL(file);
  }

  async function viewFile(filename){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"get_file_url",
        bucket:currentBucket,
        filename
      })
    });
    const data = await res.json();
    window.open(data.url, "_blank");
  }

  async function deleteFile(filename){
    await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"delete",
        bucket:currentBucket,
        filename
      })
    });
    login();
  }

  async function uploadMultipart(){

    const fileInput = document.getElementById("fileInput");
    if(!fileInput.files.length) { alert("Select a file first."); return; }
    if(!currentBucket) { alert("Log in first."); return; }

    const file = fileInput.files[0];

    const startRes = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"start_multipart",
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        uid: document.getElementById("uid").value,
        filename:file.name
      })
    });

    const {uploadId} = await startRes.json();

    const chunkSize = 5 * 1024 * 1024;
    const parts=[];
    let partNumber=1;

    for(let start=0;start<file.size;start+=chunkSize){
      const chunk = file.slice(start,start+chunkSize);

      const urlRes = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          action:"get_presigned_part",
          uploadId,
          filename:file.name,
          partNumber,
          bucket:currentBucket
        })
      });

      const {url} = await urlRes.json();

      const uploadRes = await fetch(url,{
        method:"PUT",
        body:chunk
      });

      parts.push({
        ETag: uploadRes.headers.get("ETag").replace(/"/g,""),
        PartNumber: partNumber
      });

      partNumber++;
    }

    await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"complete_multipart",
        bucket:currentBucket,
        filename:file.name,
        uploadId,
        parts
      })
    });

    alert("Large file upload complete!");
    login();
  }

  /* NEW COPY FUNCTION */
  function copyUID() {
    const uidField = document.getElementById("uid");
    if(!uidField.value){
      alert("No UID to copy.");
      return;
    }
    uidField.select();
    uidField.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("UID copied to clipboard!");
  }

</script>
</body>
</html>
