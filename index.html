<!DOCTYPE html>
<html>
<head>
  <title>Project Spider User Portal</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
    }

    .container {
      display: flex;
    }

    .left {
      width: 300px;
      margin-right: 50px;
      background-color: #f5f5dc;
      padding: 20px;
      border-radius: 8px;
    }

    .right {
      flex: 1;
      background-color: #0b1f3a;
      color: white;
      padding: 20px;
      border-radius: 8px;
    }

    input { 
      margin: 5px 0; 
      padding: 5px; 
      width: 200px; 
    }

    button { 
      margin: 5px 5px 5px 0; 
      padding: 5px 10px; 
      cursor: pointer;
    }

    #files { 
      margin-top: 10px; 
      list-style: none;
      padding-left: 0;
    }

    .right li {
      margin-bottom: 8px;
    }

    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
<pre>
PROJECT
  / _ \
\_\(_)/_/
 _//o\\_ 
  /   \
SPIDER
</pre>

    <h2>Sign Up / Log In</h2>
    <input id="username" placeholder="Username" />
    <br/>
    <input id="password" placeholder="Password" type="password" />
    <br/>
    <input id="uid" placeholder="UID (Required for Login)" />
    <button onclick="copyUID()">Copy UID</button>
    <br/>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>
    <div id="status"></div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h3>Upload a file:</h3>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload</button>
    <button onclick="uploadMultipart()">Upload Large File (5MB+)</button>

    <h3>Files in your bucket:</h3>
    <ul id="files"></ul>
  </div>

</div>

<script>
  const API_URL = "https://eu4gu0tc83.execute-api.us-east-2.amazonaws.com/spoder/user";
  let currentBucket = "";
  let currentUser   = { username: "", password: "", uid: "" };

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  // Store credentials in one place so all functions stay in sync
  function readCredentials() {
    return {
      username: document.getElementById("username").value.trim(),
      password: document.getElementById("password").value,
      uid:      document.getElementById("uid").value.trim()
    };
  }

  // -----------------------------
  // SIGNUP
  // -----------------------------
  async function signup() {
    const { username, password } = readCredentials();
    if (!username || !password) { alert("Enter both username and password."); return; }

    setStatus("Signing up...");
    const res  = await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ action: "signup", username, password })
    });
    const data = await res.json();

    if (data.uid) {
      document.getElementById("uid").value = data.uid;
      currentBucket = data.bucket;
      currentUser   = { username, password, uid: data.uid };
      setStatus(`Signed up! Your UID is ${data.uid} — copy it now, you need it to log in.`);
    } else {
      setStatus(data.error || "Signup failed.");
    }
  }

  // -----------------------------
  // LOGIN
  // -----------------------------
  async function login() {
    const creds = readCredentials();
    if (!creds.username || !creds.password || !creds.uid) {
      alert("Enter username, password, and UID.");
      return;
    }

    setStatus("Logging in...");
    const res  = await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ action: "login", ...creds })
    });
    const data = await res.json();

    if (!data.files) {
      setStatus(data.error || "Login failed.");
      return;
    }

    currentBucket = data.bucket;
    currentUser   = creds;
    setStatus("Logged in.");
    renderFileList(data.files);
  }

  // -----------------------------
  // RENDER FILE LIST
  // -----------------------------
  function renderFileList(files) {
    const ul = document.getElementById("files");
    ul.innerHTML = "";

    if (!files.length) {
      ul.innerHTML = "<li>No files yet.</li>";
      return;
    }

    files.forEach(f => {
      const li = document.createElement("li");
      li.innerHTML = `
        ${f}
        <button onclick="viewFile('${f}')">View</button>
        <button onclick="downloadFile('${f}')">Download</button>
        <button onclick="deleteFile('${f}')">Delete</button>
      `;
      ul.appendChild(li);
    });
  }

  // -----------------------------
  // GET FILE URL
  // -----------------------------
  async function getFileUrl(filename) {
    if (!currentBucket || !currentUser.username) {
      alert("Log in first!");
      return null;
    }

    const res  = await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({
        action:   "get_file_url",
        bucket:   currentBucket,
        filename,
        ...currentUser
      })
    });
    const data = await res.json();

    if (!data.url) {
      alert(data.error || "Failed to get file URL");
      return null;
    }
    return data.url;
  }

  // -----------------------------
  // VIEW FILE
  // -----------------------------
  async function viewFile(filename) {
    const url = await getFileUrl(filename);
    if (url) window.open(url, "_blank");
  }

  // -----------------------------
  // DOWNLOAD FILE
  // -----------------------------
  async function downloadFile(filename) {
    const url = await getFileUrl(filename);
    if (!url) return;

    const fileRes = await fetch(url);
    const blob    = await fileRes.blob();
    const a       = document.createElement("a");
    const blobUrl = window.URL.createObjectURL(blob);
    a.href     = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(blobUrl);
  }

  // -----------------------------
  // DELETE FILE
  // -----------------------------
  async function deleteFile(filename) {
    setStatus("Deleting...");
    await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({
        action:   "delete",
        bucket:   currentBucket,
        filename,
        ...currentUser
      })
    });
    setStatus("Deleted.");
    login(); // refresh file list
  }

  // -----------------------------
  // UPLOAD FILE
  // -----------------------------
  async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    if (!fileInput.files.length) { alert("Select a file first."); return; }
    if (!currentBucket)          { alert("Log in first.");        return; }

    const file = fileInput.files[0];

    // Warn early on the frontend — anything over ~6MB will fail through API Gateway
    if (file.size > 6 * 1024 * 1024) {
        setStatus("File is too large for direct upload. Use the 'Upload Large File' button instead.");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function() {
        setStatus(`Uploading ${file.name}...`);
        const fileContent = reader.result.split(",")[1];
        const res = await fetch(API_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({
                action:   "upload",
                bucket:   currentBucket,
                filename: file.name,
                content:  fileContent,
                ...currentUser
            })
        });
        const data = await res.json();
        setStatus(data.success ? `${file.name} uploaded.` : (data.error || "Upload failed."));
        if (data.success) login();
    };
    reader.readAsDataURL(file);
  }
  // -----------------------------
  // MULTIPART UPLOAD
  // -----------------------------
  async function uploadMultipart() {
    const fileInput = document.getElementById("fileInput");
    if (!fileInput.files.length) { alert("Select a file first."); return; }
    if (!currentBucket)          { alert("Log in first.");        return; }

    const file = fileInput.files[0];

    try {
      setStatus("Starting multipart upload...");

      // 1. Start — bucket comes back from server, not sent by client
      const startRes  = await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          action:   "start_multipart",
          filename: file.name,
          ...currentUser
        })
      });
      const startData = await startRes.json();
      if (!startData.uploadId) throw new Error(startData.error || "Failed to get uploadId");

      const { uploadId, bucket } = startData;

      // 2. Upload parts
      const chunkSize = 5 * 1024 * 1024; // 5 MB
      const parts     = [];
      let   partNumber = 1;
      const totalParts = Math.ceil(file.size / chunkSize);

      for (let start = 0; start < file.size; start += chunkSize) {
        const chunk = file.slice(start, start + chunkSize);
        setStatus(`Uploading part ${partNumber} of ${totalParts}...`);

        const presignRes  = await fetch(API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            action:     "get_presigned_part",
            uploadId,
            bucket,
            filename:   file.name,
            partNumber,
            ...currentUser
          })
        });
        const { url } = await presignRes.json();

        const uploadRes = await fetch(url, { method: "PUT", body: chunk });
        const etag      = uploadRes.headers.get("ETag");
        if (!etag) throw new Error(`No ETag returned for part ${partNumber}`);
        parts.push({ ETag: etag.replace(/"/g, ""), PartNumber: partNumber });
        partNumber++;
      }

      // 3. Complete
      setStatus("Completing upload...");
      const completeRes  = await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          action:   "complete_multipart",
          bucket,
          filename: file.name,
          uploadId,
          parts,
          ...currentUser
        })
      });
      const completeData = await completeRes.json();
      if (!completeData.success) throw new Error("Multipart completion failed");

      setStatus("Large file uploaded successfully.");
      login(); // refresh file list

    } catch (err) {
      setStatus("Upload error: " + err.message);
      console.error(err);
    }
  }

  // -----------------------------
  // COPY UID
  // -----------------------------
  async function copyUID() {
    const uid = document.getElementById("uid").value;
    if (!uid) { alert("No UID to copy."); return; }
    try {
      await navigator.clipboard.writeText(uid);
      setStatus("UID copied to clipboard.");
    } catch {
      // Fallback for older browsers
      document.getElementById("uid").select();
      document.execCommand("copy");
      setStatus("UID copied.");
    }
  }
</script>

</body>
</html>
